name: open_budget
description: "A fully free, open source finances app that helps people budget, teaches money saving strategies, and tracks spending."
publish_to: 'none'
version: 1.0.4+5

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.0

  # Local Database
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.0

  # Navigation
  go_router: ^14.0.0

  # UI Components
  cupertino_icons: ^1.0.6
  fl_chart: ^0.67.0
  intl: ^0.19.0
  google_fonts: ^8.0.2

  # Utilities
  shared_preferences: ^2.2.2
  uuid: ^4.4.0
  equatable: ^2.0.5
  flutter_local_notifications: ^17.1.2
  encrypt: ^5.0.3
  archive: ^3.6.1
  share_plus: ^10.0.0
  file_picker: ^8.0.0
  url_launcher: ^6.3.0
  local_auth: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.0
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
